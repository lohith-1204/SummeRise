<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}SummeRise{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07070d;
      --surface: #0e0e18;
      --surface2: #13131e;
      --border: rgba(255,255,255,0.06);
      --border-strong: rgba(255,255,255,0.11);
      --border-hover: rgba(124,106,247,0.5);
      --accent: #7c6af7;
      --accent-bright: #a695ff;
      --accent-glow: rgba(124,106,247,0.14);
      --text: #eeeef8;
      --text2: #9898b4;
      --muted: #50506a;
      --danger: #f77070;
      --success: #5eefaa;
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'Instrument Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle dot grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* Top purple bloom */
    body::after {
      content: '';
      position: fixed;
      top: -220px; left: 50%;
      transform: translateX(-50%);
      width: 1000px; height: 500px;
      background: radial-gradient(ellipse, rgba(124,106,247,0.2) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,7,13,0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 0 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }

    .nav-brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.03em;
    }
    .nav-brand .rise { color: var(--accent); }

    .nav-pill {
      display: flex; align-items: center; gap: 7px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--accent-bright);
      background: var(--accent-glow);
      border: 1px solid rgba(124,106,247,0.22);
      padding: 5px 13px;
      border-radius: 100px;
    }
    .nav-pill::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent-bright);
      box-shadow: 0 0 7px var(--accent);
      animation: blink 2.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

    main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.4rem, 5vw, 3.4rem);
      letter-spacing: -0.045em;
      line-height: 1.04;
    }
    h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 24px;
      border-radius: var(--radius-sm);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.18s ease;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--accent-bright);
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(124,106,247,0.4);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.65; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border-strong);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--border-hover); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 8px 40px rgba(124,106,247,0.09);
      transform: translateY(-2px);
    }

    .tag {
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 100px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .tag-default { background: var(--accent-glow); color: var(--accent-bright); border: 1px solid rgba(124,106,247,0.22); }

    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      display: none;
      animation: slideUp 0.22s ease;
      max-width: 340px;
      backdrop-filter: blur(16px);
    }
    .toast.success { background: rgba(94,239,170,0.1); border: 1px solid rgba(94,239,170,0.22); color: var(--success); }
    .toast.error   { background: rgba(247,112,112,0.1); border: 1px solid rgba(247,112,112,0.22); color: var(--danger); }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">Summe<span class="rise">Rise</span></a>
    <span class="nav-pill">Groq AI</span>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <div class="toast" id="toast"></div>

  <script>
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 4500);
    }
  </script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
